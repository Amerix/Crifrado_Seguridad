<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cifrador César y Atbash</title>

<style>

body {
    font-family: 'Segoe UI', monospace;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e2e8f0;
    padding: 20px;
    margin: 0;
}

.container {
    max-width: 720px;
    margin: auto;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 0 25px rgba(37, 99, 235, 0.35);
    border: 1px solid rgba(59, 130, 246, 0.25);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #60a5fa;
}

label {
    font-size: 14px;
    color: #cbd5f5;
}

textarea, input, select {
    width: 100%;
    margin: 8px 0 16px 0;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #020617;
    color: #e2e8f0;
    font-family: monospace;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #2563eb, #06b6d4);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

h3 {
    color: #22c55e;
}

</style>
</head>

<body>

<div class="container">

<h2>🔐 CipherLab — César & Atbash</h2>

<p style="text-align:center; font-size:13px; color:#94a3b8;">
Sistema de cifrado basado en ASCII — Americo Ismael Calzada Gonzalez
</p>

<label>Texto:</label>
<textarea id="texto"></textarea>

<label>Alfabeto (ASCII):</label>
<input id="alfabeto" value="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz">

<label>Método:</label>
<select id="metodo">
<option value="cesar">César</option>
<option value="atbash">Atbash</option>
</select>

<label>Operación:</label>
<select id="operacion">
<option value="cifrar">Cifrar</option>
<option value="descifrar">Descifrar</option>
</select>

<label>Desplazamiento (solo César):</label>
<input id="shift" type="number" value="3">

<button onclick="procesar()">Procesar</button>

<h3>Resultado:</h3>
<textarea id="resultado" readonly></textarea>

<h3>Detección automática de desplazamiento:</h3>
<textarea id="autoResultados" readonly style="height:220px;"></textarea>

</div>

<script>

/*
=========================================================
MOTOR DE CIFRADO — CipherLab
Implementa César y Atbash usando ASCII
=========================================================
*/

function cesar(texto, alfabeto, shift, descifrar=false) {

    let res = "";
    let n = alfabeto.length;

    if (descifrar) shift = -shift;

    for (let c of texto) {

        let i = alfabeto.indexOf(c);

        if (i === -1) {
            res += c;
        }
        else {
            let ni = (i + shift % n + n) % n;
            res += alfabeto[ni];
        }
    }

    return res;
}


/*
=========================================================
CIFRADO ATBASH
=========================================================
*/

function atbash(texto, alfabeto) {

    let res = "";
    let n = alfabeto.length;

    for (let c of texto) {

        let i = alfabeto.indexOf(c);

        if (i === -1) {
            res += c;
        }
        else {
            res += alfabeto[n - 1 - i];
        }
    }

    return res;
}


/*
=========================================================
FUERZA BRUTA PARA DETECTAR SHIFT EN CÉSAR
=========================================================
*/

function detectarCesar(texto, alfabeto) {

    let resultados = "";
    let n = alfabeto.length;

    for (let s = 0; s < n; s++) {

        let intento = cesar(texto, alfabeto, s, true);

        resultados += "Shift " + s + " -> " + intento + "\n";
    }

    document.getElementById("autoResultados").value = resultados;
}


/*
=========================================================
CONTROLADOR PRINCIPAL
=========================================================
*/

function procesar() {

    const texto = document.getElementById("texto").value;
    const alfabeto = document.getElementById("alfabeto").value;
    const metodo = document.getElementById("metodo").value;
    const operacion = document.getElementById("operacion").value;
    const shift = parseInt(document.getElementById("shift").value);

    let resultado = "";

    if (metodo === "cesar") {

        resultado = cesar(
            texto,
            alfabeto,
            shift,
            operacion === "descifrar"
        );

    }
    else {

        resultado = atbash(texto, alfabeto);

    }

    document.getElementById("resultado").value = resultado;

    if (metodo === "cesar") {
        detectarCesar(texto, alfabeto);
    }

}

</script>

</body>
</html>
